<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Galore — Love Calendar</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-app">
<div class="app-layout">
  <div id="sidebarContainer"></div>
  <main class="main-content">
    <div class="page-header">
      <h1><i class="fas fa-calendar-alt" style="color:var(--red);margin-right:0.5rem"></i>Love Calendar</h1>
      <p>All your important dates in one romantic view.</p>
    </div>

    <!-- Legend -->
    <div class="cal-legend">
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(192,57,43,0.65)"></div> Anniversary</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(123,0,0,0.55)"></div> Capsule Unlock</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(92,46,14,0.65)"></div> Letter Unlock</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(44,18,10,0.75)"></div> Milestone / Bucket List</div>
    </div>

    <!-- Nav -->
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
      <div class="cal-month-label" id="monthLabel"></div>
      <button class="cal-nav-btn" onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
    </div>

    <!-- Grid -->
    <div class="cal-grid" id="calGrid"></div>

    <!-- Upcoming events -->
    <div class="cal-upcoming">
      <h3><i class="fas fa-clock" style="color:var(--red);margin-right:0.5rem"></i>Upcoming Events</h3>
      <div id="upcomingList"></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>
<script>
  const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  let viewDate = new Date();
  let _events  = [];

  (async () => {
    await requireAuth();
    renderSidebar('calendar');
    _events = await loadEvents();
    renderCalendar();
  })();

  async function loadEvents() {
    const events   = [];
    const now      = new Date();
    const settings = getSettings();

    if (settings.startDate) {
      const start = new Date(settings.startDate);
      for (let yr = now.getFullYear() - 1; yr <= now.getFullYear() + 2; yr++) {
        const yrs = yr - start.getFullYear();
        events.push({ date: new Date(yr, start.getMonth(), start.getDate()),
          label: `Anniversary (${yrs} yr${yrs !== 1 ? 's' : ''})`, type: 'ann' });
      }
    }

    const [capsules, letters, story, bucket] = await Promise.all([
      getCapsules(), getLetters(), getStory(), getBucketList()
    ]);

    capsules.forEach(c => {
      events.push({ date: new Date(c.unlockDate), label: `Capsule: ${c.title}`, type: 'capsule' });
    });
    letters.forEach(l => {
      events.push({ date: new Date(l.unlockDate), label: `Letter: ${l.subject || '(untitled)'}`, type: 'letter' });
    });
    (story.timeline || []).forEach(m => {
      events.push({ date: new Date(m.date), label: m.title, type: 'milestone' });
    });
    bucket.filter(b => b.targetDate).forEach(b => {
      events.push({ date: new Date(b.targetDate), label: `🎯 ${b.title}`, type: 'milestone' });
    });

    return events;
  }

  function getEventsForDate(date, events) {
    return events.filter(e => {
      const d = e.date;
      return d.getFullYear() === date.getFullYear() && d.getMonth() === date.getMonth() && d.getDate() === date.getDate();
    });
  }

  function changeMonth(dir) {
    viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + dir, 1);
    renderCalendar();
  }

  function renderCalendar() {
    const year  = viewDate.getFullYear();
    const month = viewDate.getMonth();
    const today = new Date();

    document.getElementById('monthLabel').textContent = `${MONTHS[month]} ${year}`;

    let html = DAYS.map(d => `<div class="cal-day-header">${d}</div>`).join('');

    const firstDay    = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const daysInPrev  = new Date(year, month, 0).getDate();

    for (let i = firstDay - 1; i >= 0; i--) {
      html += `<div class="cal-cell other-month"><div class="cal-date">${daysInPrev - i}</div></div>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const cellDate  = new Date(year, month, d);
      const isToday   = cellDate.toDateString() === today.toDateString();
      const dayEvents = getEventsForDate(cellDate, _events);
      const dotsHtml  = dayEvents.slice(0,3).map(e => `<span class="cal-event-dot ${e.type}">${e.label}</span>`).join('');
      html += `<div class="cal-cell ${isToday ? 'today' : ''} ${dayEvents.length > 0 ? 'has-events' : ''}">
        <div class="cal-date">${d}</div>${dotsHtml}</div>`;
    }

    const totalCells = firstDay + daysInMonth;
    const remaining  = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (let d = 1; d <= remaining; d++) {
      html += `<div class="cal-cell other-month"><div class="cal-date">${d}</div></div>`;
    }

    document.getElementById('calGrid').innerHTML = html;
    renderUpcoming(_events);
  }

  function renderUpcoming(events) {
    const now      = new Date();
    const upcoming = events
      .filter(e => e.date >= now)
      .sort((a, b) => a.date - b.date)
      .slice(0, 10);

    const el = document.getElementById('upcomingList');
    if (upcoming.length === 0) {
      el.innerHTML = `<div style="color:rgba(255,245,238,0.35);font-style:italic;font-size:0.88rem">No upcoming events. Add capsules, letters, or milestones to see them here.</div>`;
      return;
    }
    el.innerHTML = upcoming.map(e => {
      const diff      = Math.ceil((e.date - now) / 86400000);
      const diffLabel = diff === 0 ? 'Today' : diff === 1 ? 'Tomorrow' : `In ${diff} days`;
      return `<div class="cal-upcoming-item">
        <div class="cal-upcoming-date">${diffLabel}</div>
        <div>
          <div class="cal-upcoming-title">${e.label}</div>
          <div class="cal-upcoming-sub">${e.date.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>
        </div>
        <span class="cal-event-dot ${e.type}" style="margin:0;flex-shrink:0">${e.type}</span>
      </div>`;
    }).join('');
  }
</script>
</body>
</html>
