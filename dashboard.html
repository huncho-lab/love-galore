<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Galore — Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .quick-actions { display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem; }
    .quick-card { background:var(--card-bg);border:1px solid var(--glass-border);border-radius:14px;padding:1.3rem;backdrop-filter:blur(10px);cursor:pointer;transition:all 0.3s;display:flex;align-items:center;gap:1rem;text-decoration:none; }
    .quick-card:hover { transform:translateY(-4px);border-color:var(--red);box-shadow:0 12px 36px rgba(0,0,0,0.55); }
    .qc-icon { width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0; }
    .qc-red   { background:rgba(123,0,0,0.4);color:var(--red); }
    .qc-brown { background:rgba(92,46,14,0.5);color:var(--gold); }
    .qc-dark  { background:rgba(44,18,10,0.6);color:var(--light-brown); }
    .qc-label { font-size:0.95rem;color:var(--cream);font-family:'Playfair Display',serif; }
    .qc-desc  { font-size:0.78rem;color:rgba(255,245,238,0.45);margin-top:0.12rem; }
    .section-title { font-size:1.05rem;color:var(--cream);margin-bottom:1.2rem;display:flex;align-items:center;gap:0.5rem; }
    .section-title i { color:var(--red); }
    .love-quote { background:linear-gradient(135deg,rgba(123,0,0,0.3),rgba(92,46,14,0.3));border:1px solid rgba(212,169,106,0.22);border-radius:14px;padding:1.4rem 1.8rem;text-align:center;margin-bottom:2rem; }
    .love-quote blockquote { font-family:'Playfair Display',serif;font-style:italic;font-size:1.05rem;color:var(--cream);line-height:1.8; }
    .love-quote cite { font-size:0.8rem;color:var(--mid-brown);margin-top:0.4rem;display:block; }
  </style>
</head>
<body class="bg-app">
<div class="app-layout">
  <div id="sidebarContainer"></div>
  <main class="main-content">

    <!-- Search bar -->
    <div class="search-bar-wrap" onclick="document.getElementById('dashSearch').focus()">
      <i class="fas fa-search"></i>
      <input type="text" id="dashSearch" placeholder="Search capsules, letters, bucket list, story..."
        onkeydown="if(event.key==='Enter'&&this.value.trim())window.location.href='search.html?q='+encodeURIComponent(this.value.trim())">
    </div>

    <!-- Days together hero -->
    <div id="daysHero"></div>

    <!-- Daily love quote -->
    <div class="love-quote">
      <blockquote id="loveQuote"></blockquote>
      <cite id="loveQuoteAuthor"></cite>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Quick Actions -->
    <div class="quick-actions">
      <a href="time-capsules.html#create" class="quick-card">
        <div class="qc-icon qc-red"><i class="fas fa-plus"></i></div>
        <div><div class="qc-label">New Capsule</div><div class="qc-desc">Seal a moment forever</div></div>
      </a>
      <a href="love-letters.html#write" class="quick-card">
        <div class="qc-icon qc-brown"><i class="fas fa-envelope"></i></div>
        <div><div class="qc-label">Write a Letter</div><div class="qc-desc">Send love through time</div></div>
      </a>
      <a href="our-story.html" class="quick-card">
        <div class="qc-icon qc-dark"><i class="fas fa-pen-nib"></i></div>
        <div><div class="qc-label">Our Story</div><div class="qc-desc">Add to your journal</div></div>
      </a>
      <a href="date-ideas.html" class="quick-card">
        <div class="qc-icon qc-red"><i class="fas fa-robot"></i></div>
        <div><div class="qc-label">Date Ideas</div><div class="qc-desc">AI-powered romance</div></div>
      </a>
      <a href="gallery.html" class="quick-card">
        <div class="qc-icon qc-brown"><i class="fas fa-camera-retro"></i></div>
        <div><div class="qc-label">Gallery</div><div class="qc-desc">Your photo memories</div></div>
      </a>
      <a href="bucket-list.html" class="quick-card">
        <div class="qc-icon qc-dark"><i class="fas fa-check-circle"></i></div>
        <div><div class="qc-label">Bucket List</div><div class="qc-desc">Dreams to chase together</div></div>
      </a>
    </div>

    <!-- Quick notes -->
    <div class="notes-panel">
      <h3><i class="fas fa-sticky-note"></i> Quick Notes</h3>
      <div class="note-input-row">
        <input type="text" id="noteInput" placeholder="Jot a quick thought... ♥" maxlength="200"
          onkeydown="if(event.key==='Enter')submitNote()">
        <button class="btn-primary" style="width:auto;padding:0.75rem 1.4rem" onclick="submitNote()">
          <i class="fas fa-plus"></i>
        </button>
      </div>
      <div class="notes-list" id="notesList"></div>
    </div>

    <!-- Recent Capsules -->
    <div style="margin-bottom:2rem">
      <div class="section-title"><i class="fas fa-box-open"></i> Recent Capsules</div>
      <div id="recentCapsules"></div>
    </div>

  </main>
</div>

<script src="js/app.js"></script>
<script>
  if (!requireAuth()) void 0;
  renderSidebar('dashboard');

  const user = getUser();

  // Days together hero
  const days = getDaysTogether();
  const ann  = getNextAnniversary();
  const heroEl = document.getElementById('daysHero');
  if (days !== null) {
    const startDate = getSettings().startDate;
    heroEl.innerHTML = `
      <div class="days-hero">
        <div>
          <div class="days-num">${days.toLocaleString()}</div>
          <div class="days-label">Days Together</div>
          <div class="days-meta">Since ${formatDate(startDate)}</div>
        </div>
        ${ann ? `<div class="ann-badge"><i class="fas fa-calendar-heart"></i> Anniversary in ${ann.days} day${ann.days !== 1 ? 's' : ''}</div>` : ''}
      </div>`;
  } else {
    heroEl.innerHTML = `<div style="margin-bottom:1.5rem;padding:1rem;background:rgba(44,18,10,0.5);border-radius:12px;border:1px dashed rgba(212,169,106,0.2);text-align:center">
      <a href="settings.html" style="color:var(--gold);font-size:0.88rem"><i class="fas fa-cog"></i> Set your relationship start date in Settings to see your days together</a>
    </div>`;
  }

  // Love quote
  const quotes = [
    { text: "You are my today and all of my tomorrows.", author: "Leo Christopher" },
    { text: "Whatever our souls are made of, his and mine are the same.", author: "Emily Brontë" },
    { text: "I love you not only for what you are, but for what I am when I am with you.", author: "Roy Croft" },
    { text: "The best thing to hold onto in life is each other.", author: "Audrey Hepburn" },
    { text: "In all the world, there is no heart for me like yours.", author: "Maya Angelou" },
    { text: "Every love story is beautiful, but ours is my favourite.", author: "Unknown" },
    { text: "I saw that you were perfect, and so I loved you. Then I saw that you were not perfect and I loved you even more.", author: "Angelita Lim" },
    { text: "To love is nothing. To be loved is something. But to love and be loved, that's everything.", author: "T. Tolis" },
    { text: "You don't love someone for their looks, or their clothes, or their fancy car, but because they sing a song only you can hear.", author: "Oscar Wilde" },
  ];
  const q = quotes[Math.floor(Math.random() * quotes.length)];
  document.getElementById('loveQuote').textContent = `"${q.text}"`;
  document.getElementById('loveQuoteAuthor').textContent = `— ${q.author}`;

  // Stats
  const capsules = getCapsules();
  const savedIdeas = getSavedIdeas();
  const letters = getLetters();
  const bucket = getBucketList();
  document.getElementById('statsGrid').innerHTML = [
    { icon:'fas fa-box-open',  value: capsules.length,                                             label:'Time Capsules' },
    { icon:'fas fa-envelope',  value: letters.filter(l => isLetterUnlocked(l)).length,             label:'Unlocked Letters' },
    { icon:'fas fa-check-circle', value: bucket.filter(b => b.completed).length+'/'+bucket.length, label:'Bucket List' },
    { icon:'fas fa-bookmark',  value: savedIdeas.length,                                           label:'Saved Date Ideas' },
  ].map(s => `<div class="stat-card">
    <div class="stat-icon"><i class="${s.icon}"></i></div>
    <div><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div></div>
  </div>`).join('');

  // Notes
  function renderNotes() {
    const notes = getNotes();
    const el = document.getElementById('notesList');
    if (notes.length === 0) { el.innerHTML = `<div style="font-size:0.82rem;color:rgba(255,245,238,0.25);padding:0.5rem">No notes yet — write something sweet ♥</div>`; return; }
    el.innerHTML = notes.slice(0, 8).map(n => `
      <div class="note-chip">
        <div>
          <div>${n.text}</div>
          <div class="note-chip-meta">${n.by} · ${timeAgo(n.createdAt)}</div>
        </div>
        <button class="note-del" onclick="removeNote('${n.id}')"><i class="fas fa-times"></i></button>
      </div>`).join('');
  }
  function submitNote() {
    const input = document.getElementById('noteInput');
    const text = input.value.trim();
    if (!text) return;
    addNote(text); input.value = ''; renderNotes();
  }
  function removeNote(id) { deleteNote(id); renderNotes(); }
  renderNotes();

  // Recent capsules
  const recentEl = document.getElementById('recentCapsules');
  if (capsules.length === 0) {
    recentEl.innerHTML = `<div class="empty-state" style="padding:2rem">
      <div class="empty-icon"><i class="fas fa-box-open"></i></div>
      <h3>No capsules yet</h3><p>Create your first time capsule</p></div>`;
  } else {
    recentEl.innerHTML = `<div class="card-grid">${capsules.slice(0,3).map(c => {
      const u = isUnlocked(c);
      return `<div class="card ${u?'':'card-locked'}">
        <div class="lock-icon"><i class="fas fa-${u?'lock-open':'lock'}" style="color:${u?'var(--gold)':'var(--mid-brown)'}"></i></div>
        <div class="card-title">${c.title}</div>
        <div class="card-subtitle">${timeAgo(c.createdAt)}</div>
        ${u ? `<div class="card-body">${c.message.substring(0,100)}...</div>` : `<div class="unlock-date">${formatUnlockDate(c.unlockDate)}</div>`}
        <div class="card-footer"><span class="privacy-badge ${c.privacy}"><i class="fas fa-${c.privacy==='public'?'globe':'lock'}"></i> ${c.privacy}</span></div>
      </div>`;
    }).join('')}</div>`;
  }
</script>
</body>
</html>
