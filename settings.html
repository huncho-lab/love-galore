<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Galore — Settings</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-app">
<div class="app-layout">
  <div id="sidebarContainer"></div>
  <main class="main-content">
    <div class="page-header">
      <h1><i class="fas fa-cog" style="color:var(--red);margin-right:0.5rem"></i>Settings</h1>
      <p>Personalise your Love Galore experience.</p>
    </div>

    <!-- Profile -->
    <div class="settings-section">
      <h3><i class="fas fa-user-friends"></i> Your Profiles</h3>
      <div style="margin-bottom:1rem">
        <img id="couplePhotoPreview" class="couple-photo-preview" src="" alt="" style="display:none">
        <div style="display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap">
          <label class="btn-secondary" style="cursor:pointer;display:inline-flex;align-items:center;gap:0.5rem">
            <i class="fas fa-camera"></i> Upload Couple Photo
            <input type="file" id="couplePhotoInput" accept="image/*" style="display:none" onchange="handleCouplePhoto(this)">
          </label>
          <button class="btn-outline-red" onclick="removeCouplePhoto()"><i class="fas fa-times"></i> Remove Photo</button>
        </div>
      </div>
      <div class="settings-grid">
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" class="form-input" id="s-name" placeholder="Your name">
        </div>
        <div class="form-group">
          <label>Partner's Name</label>
          <input type="text" class="form-input" id="s-spouse" placeholder="Their name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" class="form-input" id="s-email" placeholder="your@email.com">
        </div>
      </div>
    </div>

    <!-- Relationship -->
    <div class="settings-section">
      <h3><i class="fas fa-calendar-alt"></i> Relationship</h3>
      <div class="settings-grid">
        <div class="form-group">
          <label>Relationship Start Date</label>
          <input type="date" class="form-input" id="s-startDate">
          <div class="api-key-note">Used to calculate days together and anniversary countdown on your dashboard.</div>
        </div>
      </div>
      <div id="daysPreview" style="margin-top:0.75rem"></div>
    </div>

    <button class="btn-primary" style="max-width:220px;margin-bottom:2rem" onclick="saveAllSettings()">
      <i class="fas fa-save"></i> &nbsp;Save Settings
    </button>

    <!-- Danger zone -->
    <div class="settings-section danger-zone">
      <h3><i class="fas fa-exclamation-triangle"></i> Danger Zone</h3>
      <p style="font-size:0.88rem;color:rgba(255,245,238,0.55);margin-bottom:1.2rem">Clearing your data is permanent and cannot be undone.</p>
      <button class="btn-danger" onclick="clearAllData()"><i class="fas fa-trash"></i> Clear All Data</button>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>
<script>
  (async () => {
    await requireAuth();
    renderSidebar('settings');

    const user     = getUser();
    const settings = getSettings();

    document.getElementById('s-name').value      = user.name || '';
    document.getElementById('s-spouse').value    = user.spouseName || '';
    const emailEl = document.getElementById('s-email');
    emailEl.value    = user.email || '';
    emailEl.readOnly = true;
    emailEl.style.opacity = '0.6';
    emailEl.style.cursor  = 'not-allowed';
    document.getElementById('s-startDate').value = settings.startDate || '';

    if (settings.couplePhoto) {
      const img = document.getElementById('couplePhotoPreview');
      img.src = settings.couplePhoto; img.style.display = 'block';
    }

    updateDaysPreview();
    document.getElementById('s-startDate').addEventListener('change', updateDaysPreview);
  })();

  function updateDaysPreview() {
    const d  = document.getElementById('s-startDate').value;
    const el = document.getElementById('daysPreview');
    if (!d) { el.innerHTML = ''; return; }
    const days = Math.max(0, Math.floor((new Date() - new Date(d)) / 86400000));
    const ann  = getNextAnniversary();
    el.innerHTML = `<div class="ann-badge" style="margin-right:0.75rem"><i class="fas fa-heart"></i> ${days.toLocaleString()} days together</div>${ann ? `<div class="ann-badge"><i class="fas fa-calendar-alt"></i> Anniversary in ${ann.days} day${ann.days!==1?'s':''}</div>` : ''}`;
  }

  async function handleCouplePhoto(input) {
    if (!input.files[0]) return;
    const src = await compressImage(input.files[0], 400, 0.75);
    const img = document.getElementById('couplePhotoPreview');
    img.src = src; img.style.display = 'block';
    await saveSettings({ couplePhoto: src });
    toast('Couple photo updated ♥', 'success');
  }

  async function removeCouplePhoto() {
    document.getElementById('couplePhotoPreview').style.display = 'none';
    await saveSettings({ couplePhoto: '' });
    toast('Photo removed', 'info');
  }

  async function saveAllSettings() {
    const name      = document.getElementById('s-name').value.trim();
    const spouse    = document.getElementById('s-spouse').value.trim();
    const startDate = document.getElementById('s-startDate').value;
    if (!name || !spouse) { toast('Names cannot be empty', 'error'); return; }
    try {
      await saveSettings({ name, spouseName: spouse, startDate });
      toast('Settings saved ♥', 'success');
      setTimeout(() => renderSidebar('settings'), 300);
    } catch(e) {
      toast('Failed to save: ' + e.message, 'error');
    }
  }

  async function clearAllData() {
    if (!confirm('This will permanently delete ALL your data — capsules, letters, photos, story. Are you sure?')) return;
    if (!confirm('Last chance — this CANNOT be undone. Continue?')) return;
    const uid = getUser().id;
    await Promise.all([
      db.from('capsules').delete().eq('user_id', uid),
      db.from('letters').delete().eq('user_id', uid),
      db.from('story').delete().eq('user_id', uid),
      db.from('gallery').delete().eq('user_id', uid),
      db.from('bucket_list').delete().eq('user_id', uid),
      db.from('notes').delete().eq('user_id', uid),
      db.from('saved_ideas').delete().eq('user_id', uid),
    ]);
    await logout();
  }
</script>
</body>
</html>
