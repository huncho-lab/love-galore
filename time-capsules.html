<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Galore — Time Capsules</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .view-tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .view-tab {
      padding: 0.6rem 1.4rem; border-radius: 8px;
      background: rgba(92,46,14,0.25); border: 1px solid rgba(212,169,106,0.25);
      color: rgba(255,245,238,0.65); cursor: pointer; font-size: 0.88rem;
      transition: all 0.3s;
    }
    .view-tab.active, .view-tab:hover { background: rgba(123,0,0,0.45); border-color: var(--red); color: var(--cream); }
    .capsule-create-form {
      max-width: 680px;
      background: var(--card-bg); border: 1px solid var(--glass-border);
      border-radius: 16px; padding: 2rem;
      backdrop-filter: blur(10px);
    }
    .countdown-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.3rem 0.8rem; border-radius: 20px;
      background: rgba(44,18,10,0.6); border: 1px solid rgba(212,169,106,0.2);
      font-size: 0.78rem; color: var(--gold);
    }
    .capsule-full-msg {
      background: rgba(92,46,14,0.2); border-radius: 10px;
      padding: 1rem; font-size: 0.9rem; color: rgba(255,245,238,0.82);
      line-height: 1.7; white-space: pre-wrap; margin: 0.75rem 0;
    }
    .filter-bar { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
    .filter-bar select { background: rgba(92,46,14,0.3); border: 1px solid rgba(212,169,106,0.3); border-radius: 8px; padding: 0.55rem 1rem; color: var(--cream); font-size: 0.88rem; cursor: pointer; }
    .filter-bar select option { background: var(--deep-brown); }
  </style>
</head>
<body class="bg-capsules">
<div class="app-layout">
  <div id="sidebarContainer"></div>

  <main class="main-content">
    <div class="page-header">
      <h1><i class="fas fa-box-open" style="color:var(--red);margin-right:0.5rem"></i>Time Capsules</h1>
      <p>Seal your most precious memories. Lock them away. Open them when the time is right.</p>
    </div>

    <!-- View Tabs -->
    <div class="view-tabs">
      <button class="view-tab active" onclick="showView('my')">My Capsules</button>
      <button class="view-tab" onclick="showView('create')">+ Create New</button>
      <button class="view-tab" onclick="showView('public')">Public Capsules</button>
    </div>

    <!-- My Capsules View -->
    <div id="view-my">
      <div class="filter-bar">
        <select id="filterStatus" onchange="renderMyCapsules()">
          <option value="all">All Capsules</option>
          <option value="locked">Locked</option>
          <option value="unlocked">Unlocked</option>
        </select>
        <select id="filterPrivacy" onchange="renderMyCapsules()">
          <option value="all">All Privacy</option>
          <option value="private">Private</option>
          <option value="public">Public</option>
        </select>
      </div>
      <div id="myCapsulesList"></div>
    </div>

    <!-- Create View -->
    <div id="view-create" style="display:none">
      <div class="capsule-create-form">
        <h2 style="font-size:1.4rem;color:var(--cream);margin-bottom:1.5rem"><i class="fas fa-feather" style="color:var(--red)"></i> Seal a New Memory</h2>
        <div class="form-group">
          <label><i class="fas fa-tag"></i> Capsule Title</label>
          <input type="text" class="form-input" id="cap-title" placeholder="E.g. Our First Anniversary..." required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-pen"></i> Your Message</label>
          <textarea class="form-input" id="cap-message" rows="6" placeholder="Write everything you want to remember — the feeling, the moment, the love..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label><i class="fas fa-calendar-alt"></i> Unlock Date</label>
            <input type="date" class="form-input" id="cap-date" required>
          </div>
          <div class="form-group">
            <label><i class="fas fa-globe"></i> Privacy</label>
            <select class="form-input" id="cap-privacy">
              <option value="private">Private (only us)</option>
              <option value="public">Public (shareable)</option>
            </select>
          </div>
        </div>
        <div class="toggle-group" style="margin-bottom:1.5rem">
          <label class="toggle-switch">
            <input type="checkbox" id="cap-notify">
            <span class="toggle-slider"></span>
          </label>
          <span class="toggle-label">Remind me a week before unlock</span>
        </div>
        <button class="btn-primary" onclick="submitCapsule()">
          <i class="fas fa-lock"></i> &nbsp;Seal This Capsule
        </button>
      </div>
    </div>

    <!-- Public Capsules View -->
    <div id="view-public" style="display:none">
      <p style="color:var(--mid-brown);margin-bottom:1.5rem;font-style:italic">Capsules shared publicly by couples around the world</p>
      <div id="publicCapsulesList"></div>
    </div>
  </main>
</div>

<!-- Modal: View unlocked capsule -->
<div class="modal-overlay" id="capsuleModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle"></h3>
      <button class="modal-close" onclick="closeModal('capsuleModal')"><i class="fas fa-times"></i></button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  if (!requireAuth()) void 0;

  renderSidebar('my-capsules');

  // Set min date for unlock to tomorrow
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
  document.getElementById('cap-date').min = tomorrow.toISOString().split('T')[0];

  function showView(name) {
    ['my', 'create', 'public'].forEach(v => {
      document.getElementById('view-' + v).style.display = v === name ? 'block' : 'none';
    });
    document.querySelectorAll('.view-tab').forEach((t, i) => {
      t.classList.toggle('active', ['my','create','public'][i] === name);
    });
    if (name === 'my') renderMyCapsules();
    if (name === 'public') renderPublicCapsules();
  }

  // Auto-open create if hash is #create, public if #public
  const hash = location.hash.replace('#', '');
  if (hash === 'create') showView('create');
  else if (hash === 'public') showView('public');
  else renderMyCapsules();

  function renderMyCapsules() {
    const user = getUser();
    let capsules = getCapsules().filter(c => c.createdBy === user.name);
    const statusFilter = document.getElementById('filterStatus').value;
    const privacyFilter = document.getElementById('filterPrivacy').value;

    if (statusFilter === 'locked')   capsules = capsules.filter(c => !isUnlocked(c));
    if (statusFilter === 'unlocked') capsules = capsules.filter(c => isUnlocked(c));
    if (privacyFilter !== 'all')     capsules = capsules.filter(c => c.privacy === privacyFilter);

    const el = document.getElementById('myCapsulesList');
    if (capsules.length === 0) {
      el.innerHTML = `<div class="empty-state">
        <div class="empty-icon"><i class="fas fa-box-open"></i></div>
        <h3>No capsules here yet</h3>
        <p>Create your first capsule and seal a beautiful memory</p>
      </div>`;
      return;
    }
    el.innerHTML = `<div class="card-grid">${capsules.map(capsule => buildCapsuleCard(capsule, true)).join('')}</div>`;
  }

  function renderPublicCapsules() {
    const capsules = getCapsules().filter(c => c.privacy === 'public');
    const el = document.getElementById('publicCapsulesList');
    if (capsules.length === 0) {
      el.innerHTML = `<div class="empty-state">
        <div class="empty-icon"><i class="fas fa-globe"></i></div>
        <h3>No public capsules yet</h3>
        <p>Create a public capsule and share your love story with the world</p>
      </div>`;
      return;
    }
    el.innerHTML = `<div class="card-grid">${capsules.map(c => buildCapsuleCard(c, false)).join('')}</div>`;
  }

  function buildCapsuleCard(c, showDelete) {
    const unlocked = isUnlocked(c);
    return `<div class="card ${unlocked ? '' : 'card-locked'}">
      <div class="lock-icon">
        <i class="fas fa-${unlocked ? 'lock-open' : 'lock'}" style="color:${unlocked ? 'var(--gold)' : 'var(--mid-brown)'}"></i>
      </div>
      <div class="card-title">${c.title}</div>
      <div class="card-subtitle">Created ${timeAgo(c.createdAt)} · by ${c.createdBy}</div>
      ${unlocked
        ? `<div class="card-body">${c.message.substring(0, 120)}${c.message.length > 120 ? '...' : ''}</div>`
        : `<div class="countdown-badge"><i class="fas fa-hourglass-half"></i> ${formatUnlockDate(c.unlockDate)}</div>`
      }
      <div class="card-footer">
        <span class="privacy-badge ${c.privacy}">
          <i class="fas fa-${c.privacy === 'public' ? 'globe' : 'lock'}"></i> ${c.privacy}
        </span>
        ${unlocked
          ? `<button class="btn-sm gold" onclick="openCapsule('${c.id}')"><i class="fas fa-envelope-open"></i> Open</button>`
          : `<span style="font-size:0.75rem;color:var(--mid-brown)">${new Date(c.unlockDate).toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'})}</span>`
        }
        ${showDelete ? `<button class="btn-danger btn-sm" onclick="removeCapsule('${c.id}')"><i class="fas fa-trash"></i></button>` : ''}
      </div>
    </div>`;
  }

  function submitCapsule() {
    const title   = document.getElementById('cap-title').value.trim();
    const message = document.getElementById('cap-message').value.trim();
    const date    = document.getElementById('cap-date').value;
    const privacy = document.getElementById('cap-privacy').value;

    if (!title || !message || !date) { toast('Please fill in all fields', 'error'); return; }
    createCapsule({ title, message, unlockDate: date, privacy });
    toast('Capsule sealed! ♥ It will unlock on ' + formatDate(date), 'success');
    document.getElementById('cap-title').value = '';
    document.getElementById('cap-message').value = '';
    showView('my');
  }

  function openCapsule(id) {
    const c = getCapsules().find(x => x.id === id);
    if (!c) return;
    document.getElementById('modalTitle').textContent = c.title;
    document.getElementById('modalContent').innerHTML = `
      <div style="font-size:0.8rem;color:var(--mid-brown);margin-bottom:1rem">
        Sealed ${formatDate(c.createdAt)} · Unlocked ${formatDate(c.unlockDate)}
      </div>
      <div class="capsule-full-msg">${c.message}</div>
      <div style="margin-top:1rem;display:flex;gap:0.75rem;align-items:center">
        <span class="privacy-badge ${c.privacy}"><i class="fas fa-${c.privacy==='public'?'globe':'lock'}"></i> ${c.privacy}</span>
        ${c.privacy === 'private'
          ? `<button class="btn-secondary" onclick="makePublic('${c.id}')"><i class="fas fa-globe"></i> Make Public</button>`
          : `<button class="btn-outline-red" onclick="makePrivate('${c.id}')"><i class="fas fa-lock"></i> Make Private</button>`
        }
      </div>
    `;
    document.getElementById('capsuleModal').classList.add('open');
  }

  function makePublic(id) {
    const capsules = getCapsules().map(c => c.id === id ? {...c, privacy:'public'} : c);
    saveCapsules(capsules);
    closeModal('capsuleModal');
    toast('Capsule is now public ♥', 'success');
    renderMyCapsules();
  }

  function makePrivate(id) {
    const capsules = getCapsules().map(c => c.id === id ? {...c, privacy:'private'} : c);
    saveCapsules(capsules);
    closeModal('capsuleModal');
    toast('Capsule is now private', 'info');
    renderMyCapsules();
  }

  function removeCapsule(id) {
    if (!confirm('Delete this capsule permanently?')) return;
    deleteCapsule(id);
    toast('Capsule deleted', 'info');
    renderMyCapsules();
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
  }
</script>
</body>
</html>
